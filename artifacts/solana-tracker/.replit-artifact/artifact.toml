kind = "web"
previewPath = "/"
title = "Solana Wallet Tracker"
version = "1.0.0"
id = "artifacts/solana-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23042

[services.development]
run = "pnpm --filter @workspace/solana-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/solana-tracker", "run", "build" ]
publicDir = "artifacts/solana-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23042"
BASE_PATH = "/"
